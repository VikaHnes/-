<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор бізнес-кредиту</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator-container">
    <div class="calculator-header">
        <h1>Калькулятор бізнес-кредиту</h1>
        <p>Розрахуйте щомісячний платіж та переплату для вашого бізнесу</p>
    </div>

    <div class="calculator-body">
        <div class="input-section">
            <div class="form-group">
                <label for="amount">Сума кредиту (₴)</label>
                <input type="number" id="amount" placeholder="Наприклад: 500000" min="1000">
            </div>

            <div class="form-group">
                <label for="term">Термін кредитування (місяців)</label>
                <input type="number" id="term" placeholder="Наприклад: 24" min="1" max="360">
            </div>

            <div class="form-group">
                <label for="rate">Річна відсоткова ставка (%)</label>
                <input type="number" id="rate" placeholder="Наприклад: 15" min="0.1" step="0.1">
            </div>

            <button onclick="calculateLoan()" class="calc-btn">Розрахувати</button>
        </div>

        <div class="result-section">
            <h2>Результати розрахунку</h2>
            
            <div class="result-box highlight">
                <span class="result-label">Щомісячний платіж:</span>
                <span class="result-value" id="monthly-payment">0.00 ₴</span>
            </div>

            <div class="result-box">
                <span class="result-label">Загальна переплата:</span>
                <span class="result-value" id="total-overpayment">0.00 ₴</span>
            </div>

            <div class="result-box">
                <span class="result-label">Загальна сума до повернення:</span>
                <span class="result-value" id="total-payment">0.00 ₴</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
